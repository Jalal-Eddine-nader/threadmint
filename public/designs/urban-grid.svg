<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f0f9ff"/>
  <!-- Grid lines vertical -->
  <line x1="80" y1="60" x2="80" y2="320" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="60" x2="140" y2="320" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="60" x2="200" y2="320" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="60" x2="260" y2="320" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="320" y1="60" x2="320" y2="320" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <!-- Grid lines horizontal -->
  <line x1="60" y1="100" x2="340" y2="100" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="160" x2="340" y2="160" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="220" x2="340" y2="220" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="280" x2="340" y2="280" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <!-- Bold accent blocks -->
  <rect x="80" y="100" width="60" height="60" fill="#0ea5e9" opacity="0.8"/>
  <rect x="200" y="160" width="60" height="120" fill="#0369a1" opacity="0.9"/>
  <rect x="140" y="220" width="60" height="60" fill="#0ea5e9" opacity="0.5"/>
  <rect x="260" y="100" width="60" height="60" fill="#38bdf8" opacity="0.6"/>
  <!-- Label -->
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="3">URBAN GRID</text>
</svg>
